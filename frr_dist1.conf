! ================================================
! FRR Config – DIST1 Router (Distribution Layer)
! File: frr_dist1.conf
! VLAN 10: 172.16.10.0/24
! ================================================
!
! Giải thích dist1:
!   Nhận OSPF Hello từ Core qua link core-eth1↔dist1-eth1
!   Quảng bá mạng VLAN10 (172.16.10.0/24) vào OSPF
!   passive-interface dist1-eth2: không gửi Hello vào VLAN (chỉ có host)

frr version 9.0
frr defaults traditional
hostname dist1
log file /tmp/frr-dist1.log
log timestamp precision 3
!
interface dist1-eth1
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface dist1-eth2
 ip ospf passive
!
router ospf
 ospf router-id 10.255.0.2
 !
 ! Link P2P với Core
 network 192.168.1.0/30  area 0
 !
 ! Mạng VLAN 10 kết nối H1 và Printer
 network 172.16.10.0/24  area 0
 !
 ! Không gửi OSPF Hello ra interface phía Access (chỉ có hosts)
 passive-interface dist1-eth2
 !
 log-adjacency-changes detail
!
line vty
!
