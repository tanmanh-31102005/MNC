! ================================================
! FRR Config – r_out (ISP / Outside Router)
! File: frr_rout.conf
! Outside: 203.0.113.0/24  |  P2P Core: 192.168.100.0/30
! ================================================
!
! Giải thích:
!   r_out là router biên, thực hiện NAT/PAT
!   Quảng bá dải Outside (203.0.113.0/24) vào OSPF
!   passive-interface rout-eth2: không gửi Hello ra phía Internet giả lập
!   default-information originate: phân phối default route cho toàn hệ thống

frr version 9.0
frr defaults traditional
hostname r_out
log file /tmp/frr-rout.log
log timestamp precision 3
!
interface rout-eth1
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface rout-eth2
 ip ospf passive
!
router ospf
 ospf router-id 10.255.0.5
 !
 ! Link P2P Core ↔ ISP
 network 192.168.100.0/30 area 0
 !
 ! Subnet Outside / Internet giả lập
 network 203.0.113.0/24   area 0
 !
 passive-interface rout-eth2
 !
 ! QUAN TRỌNG: phân phối default route 0.0.0.0/0 cho tất cả router nội bộ
 ! (phải có default route thực tế trên r_out hoặc dùng always)
 default-information originate always
 !
 log-adjacency-changes detail
!
line vty
!
