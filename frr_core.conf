! ================================================
! FRR Config – CORE Router
! File: frr_core.conf
! OSPF Area 0 (Backbone) – kết nối tất cả routers
! ================================================
!
! Giải thích:
!   router-id: IP nhận dạng router trong OSPF (dùng loopback)
!   network X.X.X.X/YY area 0: quảng bá mạng vào Area 0
!   passive-interface: không gửi Hello ra phía host (tiết kiệm)
!   log-adjacency-changes: log khi neighbor thay đổi

frr version 9.0
frr defaults traditional
hostname core
log file /tmp/frr-core.log
log timestamp precision 3
!
interface core-eth1
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface core-eth2
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface core-eth3
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface core-eth4
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
router ospf
 ospf router-id 10.255.0.1
 !
 ! Quảng bá link P2P Core↔Dist1 (192.168.1.0/30)
 network 192.168.1.0/30   area 0
 !
 ! Quảng bá link P2P Core↔Dist2 (192.168.1.4/30)
 network 192.168.1.4/30   area 0
 !
 ! Quảng bá link P2P Core↔DMZ (192.168.1.8/30)
 network 192.168.1.8/30   area 0
 !
 ! Quảng bá link WAN Core↔ISP (192.168.100.0/30)
 network 192.168.100.0/30 area 0
 !
 ! Ghi log khi neighbor lên/xuống
 log-adjacency-changes detail
!
line vty
!
