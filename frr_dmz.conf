! ================================================
! FRR Config – DMZ Router
! File: frr_dmz.conf
! DMZ: 10.10.10.0/24  |  P2P Core: 192.168.1.8/30
! ================================================
!
! Giải thích:
!   DMZ Router ngăn cách vùng server khỏi Inside/Outside
!   Quảng bá subnet DMZ (10.10.10.0/24) vào OSPF để Core biết đường
!   passive-interface dmz-eth2: không gửi Hello ra interface server

frr version 9.0
frr defaults traditional
hostname dmz_r
log file /tmp/frr-dmz.log
log timestamp precision 3
!
interface dmz-eth1
 ip ospf hello-interval 5
 ip ospf dead-interval 20
!
interface dmz-eth2
 ip ospf passive
!
router ospf
 ospf router-id 10.255.0.4
 !
 ! Link P2P Core ↔ DMZ
 network 192.168.1.8/30  area 0
 !
 ! Subnet DMZ chứa web1, web2
 network 10.10.10.0/24   area 0
 !
 passive-interface dmz-eth2
 !
 log-adjacency-changes detail
!
line vty
!
